<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Reset Email Sent</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ffecd2, #fcb69f);
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .done-container {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(31,38,135,0.37);
      padding: 40px;
      width: 420px;
      text-align: center;
    }
    h2 {
      color: #333;
      margin-bottom: 20px;
    }
    p {
      color: #444;
      margin-bottom: 15px;
      font-size: 15px;
    }
    a {
      display: inline-block;
      margin-top: 15px;
      text-decoration: none;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }
    a:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="done-container">
    <h2>Check Your Email 📧</h2>
    <p>
      If an account exists with the email you entered, a password reset link has been sent.  
      Please check your inbox (and spam folder).
    </p>
    <a href="{% url 'login' %}">Back to Login</a>
  </div>
</body>
</html>
