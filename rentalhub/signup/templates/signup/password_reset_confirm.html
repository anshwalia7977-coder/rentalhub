<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .reset-container {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(31,38,135,0.37);
      padding: 40px;
      width: 400px;
      text-align: center;
    }
    h2 { color: #fff; margin-bottom: 20px; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <h2>Set New Password</h2>
    <form method="post">
      {% csrf_token %}
      <label for="paasword1">new password:</label>
      {{ form.new_password1 }}
      <label for="paasword2">confirm password:</label>
      {{ form.new_password2 }}
      
      <button type="submit">Reset Password</button>
    </form>
  </div>
</body>
</html>
