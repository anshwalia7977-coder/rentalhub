<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rental Confirmed</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #f0f9ff, #cbebff);
      font-family: 'Segoe UI', sans-serif;
    }
    .confirmation-box {
      max-width: 600px;
      margin: auto;
      padding: 40px;
      border-radius: 15px;
      background: #fff;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      animation: fadeIn 0.6s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .success-icon {
      font-size: 70px;
      color: #28a745;
      margin-bottom: 20px;
    }
    .btn-custom {
      border-radius: 30px;
      padding: 10px 20px;
    }
  </style>
</head>
<body>

<div class="container text-center mt-5">
  <div class="confirmation-box">
    <div class="success-icon">✅</div>
    <h2 class="text-success mb-3">Rental Confirmed!</h2>
    <p class="fs-5">Thank you, <strong>{{ user.username }}</strong>! 🎉</p>
    <p class="text-muted">Your selected products are now reserved and marked as unavailable for others.</p>

    <div class="mt-4 d-flex justify-content-center gap-3">
      <a href="{% url 'product_list' %}" class="btn btn-success btn-custom">Browse More Products</a>
      <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-custom">Go to Dashboard</a>
    </div>
  </div>
</div>

</body>
</html>
